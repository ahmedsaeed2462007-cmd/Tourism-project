<body>

        <nav>
            <ul class="navbar">
                <div class="dropdown">
                    <button class="dropbtn">
                        <!-- ده عبارة عن علامة الثلاثة شرط الهي الدروب داون منيو -->

                        </svg>
                    </button>
                    <!-- ديه اللينكات الي جوا الدروب داون -->
                    <div class="dropdown_content">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="destinations.html">Destinations</a></li>
                        <li><a href="book-a-toor.html">Book A Tour</a></li>
                        <li><a href="">FAQ</a></li>
                        <li><a href="contact-us.html">Contact Us</a></li>
                        <li><a href="">About Us</a></li>
                    </div>
                </div>
                <!-- اللوجو بتاع الموقع -->
                <li>
                    <h1 class="title">Travella</h1>
                </li>
                <!-- اللينكات الي مش هتدخل في الدروب داون -->
                <div class="visible_links">
                    <li><a href="log-in.html">Log In</a></li>
                    <li><a href="sign-up.html">Sign Up</a></li>
                    <li><a href="">Account</a></li>
                </div>
            </ul>
        </nav>
    </header>
    <div class="content">
        <div class="h-form">
            <h1 style="color:#032030">Discover the beauty of the world with us</h1>
            <form>
                <input required placeholder="Full Name" name="name" type="text" id="name">
                <input required placeholder="Email Address" name="Email" type="email" id="email">
                <input required placeholder="Phone Number" name="Phone" type="tel" id="phone" maxlength="11">
                <label for="destination">Destination</label>
                <select id="destination">
                    <option value="Pyramids of Giza">Pyramids of Giza</option>
                    <option value="Grand Egyptian Museum">Grand Egyptian Museum</option>
                    <option value="Citadel of Saladin">Citadel of Saladin</option>
                    <option value="Cairo Tower">Cairo Tower</option>
                    <option value="Luxor Temple">Luxor Temple</option>
                    <option value="Karnak Temple">Karnak Temple</option>
                    <option value="Valley of the Kings">Valley of the Kings</option>
                    <option value="Abu Simbel Temple">Abu Simbel Temple</option>
                    <option value="Siwa Oasis">Siwa Oasis</option>
                    <option value="Eiffel Tower">Eiffel Tower</option>
                    <option value="Great Wall of China">Great Wall of China</option>
                    <option value="Louvre Museum">Louvre Museum</option>
                    <option value="Maldives">Maldives</option>
                    <option value="Tower of Pisa">Tower of Pisa</option>
                    <option value="Statue of Liberty">Statue of Liberty</option>
                    <option value="Hanging Church">Hanging Church</option>
                </select>
                <label for="go">Departure Dates</label>
                <input id="go" name="Departure" required type="date">
                <label for="return">Return Dates</label>
                <input id="return" name="Return" required type="date">
                <button id="submit">Book now</button>
            </form>
        </div>
    </div>
    <div class="table">
        <div id="DELETEALL"></div>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Destination</th>
                    <th>Go</th>
                    <th>Return</th>
                    <th>Update</th>
                    <th>Delete</th>
                </tr>
            </thead>
            <tbody id="tbody">

            </tbody>
        </table>
    </div>
