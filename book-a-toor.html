<body>
    <header>
        <nav>
            <ul class="navbar">
                <div class="dropdown">
                    <button class="dropbtn">
                        <!-- ده عبارة عن علامة الثلاثة شرط الهي الدروب داون منيو -->
                        <svg viewBox="0 0 100 80" width="30" height="30" fill="currentColor">
                            <rect width="100" height="15" rx="8"></rect>
                            <rect y="30" width="100" height="15" rx="8"></rect>
                            <rect y="60" width="100" height="15" rx="8"></rect>
                        </svg>
                    </button>
                    <!-- ديه اللينكات الي جوا الدروب داون -->
                    <div class="dropdown_content">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="destinations.html">Destinations</a></li>
                        <li><a href="book-a-toor.html">Book A Tour</a></li>
                        <li><a href="">FAQ</a></li>
                        <li><a href="contact_us.html">Contact Us</a></li>
                        <li><a href="about_us.html">About Us</a></li>
                    </div>
                </div>
                <!-- اللوجو بتاع الموقع -->
                <li>
                    <h1 class="title">Travella</h1>
                </li>
                <!-- اللينكات الي مش هتدخل في الدروب داون -->
                <div class="visible_links">
                    <li><a href="log_in.html">Log In</a></li>
                    <li><a href="sign_up.html">Sign Up</a></li>
                    <li><a href="account.html">Account</a></li>
                </div>
            </ul>
        </nav>
    </header>
    <img src="media/Istanbul City.jpg" alt="background_img" class="background_img">
    <div class="content">
        <div class="h-form">
            <h1 style="color:#032030">Discover the beauty of the world with us</h1>
            <form>
                <input required placeholder="Full Name" name="name" type="text" id="name">
                <input required placeholder="Email Address" name="Email" type="email" id="email">
                <div id="emailError" style="color: red;font-size: 20px;display: none;"></div>
                <input required placeholder="Phone Number" name="Phone" type="tel" id="phone" maxlength="11">
                <div id="phoneError" style="color: red; font-size: 20px; display: none;"></div>
                <label for="destination">Destination</label>
                <select id="destination">
                    <option value="Cairo Classic Journey">Cairo Classic Journey</option>
                    <option value="Kings of the Nile">Kings of the Nile</option>
                    <option value="Red Sea Adventure">Red Sea Adventure</option>
                    <option value="Istanbul Splendor">Istanbul Splendor</option>
                    <option value="Cappadocia Adventure">Cappadocia Adventure</option>
                    <option value="Turquoise Coast">Turquoise Coast</option>
                    <option value="Cultural Escape">Cultural Escape</option>
                    <option value="Andalusia Adventure">Andalusia Adventure</option>
                    <option value="Costa del Sol">Costa del Sol</option>
                </select>
                <label for="go">Departure Dates</label>
                <input id="go" name="Departure" required type="date">
                <label for="return">Return Dates</label>
                <input id="return" name="Return" required type="date">
                <button id="submit">Book now</button>
            </form>
        </div>
    </div>
    <div class="table">
        <div id="DELETEALL"></div>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Destination</th>
                    <th>Go</th>
                    <th>Return</th>
                    <th>Update</th>
                    <th>Delete</th>
                </tr>
            </thead>
            <tbody id="tbody">

            </tbody>
        </table>
    </div>
