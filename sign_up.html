<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Travella</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lora:ital,wght@0,400..700;1,400..700&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="sign_up.css">
</head>

<body>
    <header>
        <nav>
            <div class="navbar">
                <div class="dropdown">
                    <button class="dropbtn">
                        <!-- ده عبارة عن علامة الثلاثة شرط الهي الدروب داون منيو -->
                        <svg viewBox="0 0 100 80" width="30" height="30" fill="currentColor">
                            <rect width="100" height="15" rx="8"></rect>
                            <rect y="30" width="100" height="15" rx="8"></rect>
                            <rect y="60" width="100" height="15" rx="8"></rect>
                        </svg>
                    </button>
                    <!-- ديه اللينكات الي جوا الدروب داون -->
                    <div class="dropdown_content">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="destinations.html">Destinations</a></li>
                        <li><a href="book-a-toor.html">Book A Tour</a></li>
                        <!-- <li><a href="my-bookings.html">My Bookings</a></li> -->
                        <li><a href="">FAQ</a></li>
                        <li><a href="contact_us.html">Customer Support</a></li>
                        <li><a href="about_us.html">About Us</a></li>
                    </div>
                </div>
                <!-- اللوجو بتاع الموقع -->
                <li>
                    <h1 class="title">Travella</h1>
                </li>
                <!-- اللينكات الي مش هتدخل في الدروب داون -->
                <div class="visible_links">

                    <select id="bg-selector">
                        <option value="media/Istanbul City.jpg">Istanbul</option>
                        <option value="media/spain mansion.jpg">Spain</option>
                        <option value="media/green city.jpg">Forest</option>
                        <option value="media/spain nature.jpg">Sunset</option>
                    </select>

                    <li><a href="log_in.html">Log In</a></li>
                    <li><a href="sign_up.html">Sign Up</a></li>
                    <!-- <li><a href="">Account</a></li> -->
                </div>
            </div>
        </nav>
    </header>

    <main>
        <img src="media/Istanbul City.jpg" alt="background_img" class="background_img" id="main-bg">
        <div class="container">
            <form class="glass-box">
                <h2>Create Account 🌍</h2>

                <div class="input-box">
                    <!-- <label for="name">Name</label> -->
                    <input id="name" type="text" placeholder="Full Name" required>
                </div>

                <div class="input-box">
                    <!-- <label for="email">Email</label> -->
                    <input id="email" type="email" placeholder="Email" required>
                </div>

                <div class="input-box">
                    <!-- <label for="pass">Password</label> -->
                    <input id="pass" type="password" placeholder="Password" required>
                </div>
                <div class="input-boxS">
                    <label for="BD">Birth Date</label>
                    <input id="BD" type="date" required>
                </div>
                <div class="input-box">
                    <!-- <label for="CN">Country</label> -->
                    <input id="CN" type="text" placeholder="Country" required>
                </div>
                <button type="submit">Sign Up</button>

                <p>Already have an account?
                    <a href="log_in.html">Login</a>
                </p>
                <div class="social-icons">
                    <a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#" aria-label="X (Twitter)"><i class="fa-brands fa-x-twitter"></i></a>
                    <a href="#" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>
                </div>

            </form>
        </div>
    </main>
    <script src="sign.js"></script>
    <script src="index.js"></script>
</body>

</html>
