        <div class="form-body">
            <form>
                <h2>Customer support</h2>

                <div class="input-part">
                    <label for="name">Customer Name</label>
                    <input id="name" type="text" placeholder="Name" required name="name">
                </div>

                <div class="input-part">
                    <label for="phone">Phone Number</label>
                    <input id="phone" type="tel" placeholder="Phone Number" required maxlength="11" name="phone">
                    <div id="phoneError" style="color: red; font-size: 20px; display: none;"></div>
                </div>

                <div class=" input-part">
                    <label for="email">E-mail</label>
                    <input id="email" type="email" placeholder="Enter your email" required name="email">
                    <div id="emailError" style="color: red;font-size: 20px;display: none;">Please enter a valid email
                        address.</div>
                </div>
                <div class="input-part">
                    <label for="problem">Report your problem</label>
                    <textarea id="problem" name="problem" placeholder="Describe your issue..." required></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submit">Submit</button>
            </form>
        </div>
